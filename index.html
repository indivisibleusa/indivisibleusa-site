<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Indivisible USA — Join the Movement</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --red: #C8102E; --navy: #0A1628; --white: #F8F5EE; --gold: #D4AF37; --mid: #1C2E4A; --blue: #1251C1; }
    html, body { font-family: 'DM Sans', sans-serif; background: var(--navy); min-height: 100vh; min-height: 100dvh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star { position: absolute; background: white; border-radius: 50%; animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s); opacity: 0; }
    @keyframes twinkle { 0%, 100% { opacity: 0; } 50% { opacity: var(--bright, 0.6); } }
    .stripe-top { position: fixed; top: 0; left: 0; right: 0; height: 5px; background: linear-gradient(90deg, var(--red) 0%, var(--red) 33%, var(--white) 33%, var(--white) 66%, var(--blue) 66%); z-index: 100; }
    .card { position: relative; z-index: 10; background: var(--mid); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 44px 40px 40px; width: 100%; max-width: 460px; margin: 28px 16px; box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04); animation: rise 0.7s cubic-bezier(0.22, 1, 0.36, 1) both; }
    @keyframes rise { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
    .avatar-wrap { display: flex; justify-content: center; margin-bottom: 22px; animation: rise 0.7s 0.1s cubic-bezier(0.22, 1, 0.36, 1) both; }
    .avatar-ring { width: 84px; height: 84px; border-radius: 50%; padding: 3px; background: linear-gradient(135deg, var(--red), var(--gold)); }
    .avatar-ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; }
    .eyebrow { text-align: center; font-size: 11px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(40px, 11vw, 54px); line-height: 1; letter-spacing: 0.02em; text-align: center; color: var(--white); margin-bottom: 14px; }
    h1 span { color: var(--red); }
    .sub { text-align: center; color: rgba(248,245,238,0.6); font-size: clamp(13px, 3.5vw, 15px); line-height: 1.65; margin-bottom: 22px; }
    .sub strong { color: var(--white); font-weight: 600; }
    .social-proof { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 24px; }
    .avatars { display: flex; }
    .avatars span { width: 26px; height: 26px; border-radius: 50%; background: linear-gradient(135deg, #C8102E, #0A1628); border: 2px solid var(--mid); display: flex; align-items: center; justify-content: center; font-size: 10px; margin-left: -7px; color: white; font-weight: 600; }
    .avatars span:first-child { margin-left: 0; }
    .social-proof p { font-size: 12px; color: rgba(248,245,238,0.55); }
    .social-proof p strong { color: rgba(248,245,238,0.85); }
    .form-wrap { display: flex; flex-direction: column; gap: 10px; width: 100%; }
    .form-row { display: flex; gap: 8px; }
    .form-wrap input[type="text"],
    .form-wrap input[type="email"] { flex: 1; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 13px 16px; font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--white); outline: none; transition: border-color 0.2s; width: 100%; }
    .form-wrap input::placeholder { color: rgba(248,245,238,0.35); }
    .form-wrap input:focus { border-color: rgba(255,255,255,0.3); }
    .form-wrap button { background: var(--red); color: var(--white); border: none; border-radius: 10px; padding: 13px 20px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; transition: background 0.2s, transform 0.1s; }
    .form-wrap button:hover { background: #a80d25; }
    .form-wrap button:active { transform: scale(0.97); }
    .form-wrap button:disabled { opacity: 0.6; cursor: not-allowed; }
    .form-msg { text-align: center; font-size: 13px; margin-top: 10px; min-height: 18px; }
    .form-msg.success { color: #6ee7a0; }
    .form-msg.error { color: #f87171; }
    .fine-print { text-align: center; font-size: 11px; color: rgba(248,245,238,0.28); margin-top: 14px; }
    @media (max-width: 480px) { .card { padding: 36px 22px 32px; border-radius: 16px; margin: 20px 12px; } .avatar-ring { width: 74px; height: 74px; } }
    @media (max-width: 360px) { .card { padding: 28px 16px 26px; } }
  </style>
</head>
<body>
<div class="stripe-top"></div>
<div class="stars" id="stars"></div>
<div class="card">
  <div class="avatar-wrap">
    <div class="avatar-ring">
      <img src="profile.jpg" alt="Indivisible USA" />
    </div>
  </div>
  <p class="eyebrow">Indivisible USA</p>
  <h1>Help Us <span>Heal</span> America.</h1>
  <p class="sub">Want to attend an event? <strong>Join the list</strong> and be the first to know when and where we show up next.</p>
  <div class="social-proof">
    <div class="avatars"><span>T</span><span>J</span><span>M</span><span>+</span></div>
    <p><strong>1,200+</strong> Americans already in.</p>
  </div>
  <form class="form-wrap" id="subscribe-form">
    <div class="form-row">
      <input type="text" id="name-input" placeholder="First name" />
    </div>
    <div class="form-row">
      <input type="email" id="email-input" placeholder="Email address" required />
    </div>
    <button type="submit" id="submit-btn">I'm In</button>
  </form>
  <div class="form-msg" id="form-msg"></div>
  <p class="fine-print">No spam. Just events — when they drop.</p>
</div>
<script>
  const container = document.getElementById('stars');
  for (let i = 0; i < 100; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.2 + 0.5;
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;--delay:-${(Math.random()*6).toFixed(1)}s;--bright:${(Math.random()*0.5+0.2).toFixed(2)};`;
    container.appendChild(s);
  }

  document.getElementById('subscribe-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email-input').value.trim();
    const firstName = document.getElementById('name-input').value.trim();
    const btn = document.getElementById('submit-btn');
    const msg = document.getElementById('form-msg');

    btn.disabled = true;
    btn.textContent = 'Joining...';
    msg.className = 'form-msg';
    msg.textContent = '';

    try {
      const res = await fetch('/.netlify/functions/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, firstName })
      });
      const data = await res.json();
      if (res.ok) {
        msg.className = 'form-msg success';
        msg.textContent = "You're in. We'll see you at the next event.";
        document.getElementById('email-input').value = '';
        document.getElementById('name-input').value = '';
        btn.textContent = 'Done';
      } else {
        throw new Error(data.error || 'Something went wrong.');
      }
    } catch (err) {
      msg.className = 'form-msg error';
      msg.textContent = err.message || 'Something went wrong. Try again.';
      btn.disabled = false;
      btn.textContent = "I'm In";
    }
  });
</script>
</body>
</html>
