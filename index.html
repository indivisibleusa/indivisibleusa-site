<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Indivisible USA — Join the Movement</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --red: #C8102E; --navy: #0A1628; --white: #F8F5EE; --gold: #D4AF37; --mid: #1C2E4A; }
    html, body { font-family: 'DM Sans', sans-serif; background: var(--navy); min-height: 100vh; min-height: 100dvh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star { position: absolute; background: white; border-radius: 50%; animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s); opacity: 0; }
    @keyframes twinkle { 0%, 100% { opacity: 0; } 50% { opacity: var(--bright, 0.6); } }
    .stripe-top { position: fixed; top: 0; left: 0; right: 0; height: 5px; background: linear-gradient(90deg, var(--red) 0%, var(--red) 33%, var(--white) 33%, var(--white) 66%, var(--navy) 66%); z-index: 100; }
    .card { position: relative; z-index: 10; background: var(--mid); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 44px 40px 40px; width: 100%; max-width: 460px; margin: 28px 16px; box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04); animation: rise 0.7s cubic-bezier(0.22, 1, 0.36, 1) both; }
    @keyframes rise { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
    .avatar-wrap { display: flex; justify-content: center; margin-bottom: 22px; animation: rise 0.7s 0.1s cubic-bezier(0.22, 1, 0.36, 1) both; }
    .avatar-ring { width: 84px; height: 84px; border-radius: 50%; padding: 3px; background: linear-gradient(135deg, var(--red), var(--gold)); }
    .avatar-placeholder { width: 100%; height: 100%; border-radius: 50%; background: var(--navy); display: flex; align-items: center; justify-content: center; font-size: 26px; }
    .eyebrow { text-align: center; font-size: 11px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(40px, 11vw, 54px); line-height: 1; letter-spacing: 0.02em; text-align: center; color: var(--white); margin-bottom: 14px; }
    h1 span { color: var(--red); }
    .sub { text-align: center; color: rgba(248,245,238,0.6); font-size: clamp(13px, 3.5vw, 15px); line-height: 1.65; margin-bottom: 22px; }
    .sub strong { color: var(--white); font-weight: 600; }
    .social-proof { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 24px; }
    .avatars { display: flex; }
    .avatars span { width: 26px; height: 26px; border-radius: 50%; background: linear-gradient(135deg, #C8102E, #0A1628); border: 2px solid var(--mid); display: flex; align-items: center; justify-content: center; font-size: 10px; margin-left: -7px; color: white; font-weight: 600; }
    .avatars span:first-child { margin-left: 0; }
    .social-proof p { font-size: 12px; color: rgba(248,245,238,0.55); }
    .social-proof p strong { color: rgba(248,245,238,0.85); }
    .beehiiv-wrap { width: 100%; border-radius: 12px; overflow: hidden; }
    .beehiiv-wrap iframe { width: 100%; min-height: 320px; border: none; display: block; }
    .fine-print { text-align: center; font-size: 11px; color: rgba(248,245,238,0.28); margin-top: 14px; }
    @media (max-width: 480px) { .card { padding: 36px 22px 32px; border-radius: 16px; margin: 20px 12px; } .avatar-ring { width: 74px; height: 74px; } }
    @media (max-width: 360px) { .card { padding: 28px 16px 26px; } }
  </style>
</head>
<body>
<div class="stripe-top"></div>
<div class="stars" id="stars"></div>
<div class="card">
  <div class="avatar-wrap"><div class="avatar-ring"><div class="avatar-placeholder">🇺🇸</div></div></div>
  <p class="eyebrow">Indivisible USA</p>
  <h1>Run With Us.<br><span>Stand For</span> Something.</h1>
  <p class="sub">Get <strong>first access</strong> to events, merch drops, and updates from the community that's showing up for America.</p>
  <div class="social-proof">
    <div class="avatars"><span>T</span><span>J</span><span>M</span><span>+</span></div>
    <p><strong>1,200+</strong> Americans already in.</p>
  </div>
  <div class="beehiiv-wrap" id="beehiiv-form">
    <script async src="https://subscribe-forms.beehiiv.com/embed.js"></script>
    <iframe src="https://subscribe-forms.beehiiv.com/6b536a97-3862-4c06-86c0-a8adf51afe9f" class="beehiiv-embed" data-test-id="beehiiv-embed" frameborder="0" scrolling="no" style="width: 560px; height: 339px; margin: 0; border-radius: 0px 0px 0px 0px !important; background-color: transparent; box-shadow: 0 0 #0000; max-width: 100%;"></iframe>
  </div>
  <p class="fine-print">No spam. Just events, drops, and community news.</p>
</div>
<script>
  const container = document.getElementById('stars');
  for (let i = 0; i < 100; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.2 + 0.5;
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;--delay:-${(Math.random()*6).toFixed(1)}s;--bright:${(Math.random()*0.5+0.2).toFixed(2)};`;
    container.appendChild(s);
  }
</script>
</body>
</html>
